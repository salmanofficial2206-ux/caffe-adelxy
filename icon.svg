<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#008080;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a0a0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgGradient)" rx="64" ry="64"/>

  <!-- Coffee Cup -->
  <g transform="translate(256, 256)">
    <!-- Cup body -->
    <ellipse cx="0" cy="20" rx="120" ry="80" fill="#ffffff" stroke="#008080" stroke-width="4"/>
    <rect x="-120" y="-60" width="240" height="80" rx="20" ry="20" fill="#ffffff" stroke="#008080" stroke-width="4"/>

    <!-- Handle -->
    <path d="M 120 -20 Q 150 -20 150 10 Q 150 40 120 40" fill="none" stroke="#008080" stroke-width="8" stroke-linecap="round"/>

    <!-- Coffee liquid -->
    <ellipse cx="0" cy="10" rx="100" ry="50" fill="#8B4513"/>
    <ellipse cx="0" cy="5" rx="90" ry="40" fill="#A0522D"/>

    <!-- Steam -->
    <path d="M -30 -80 Q -25 -100 -20 -80 Q -15 -110 -10 -80 Q -5 -105 0 -80 Q 5 -115 10 -80 Q 15 -100 20 -80 Q 25 -110 30 -80"
          fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Text -->
  <text x="256" y="420" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="32" font-weight="bold">COFFE</text>
  <text x="256" y="450" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="32" font-weight="bold">ADEL</text>
</svg>